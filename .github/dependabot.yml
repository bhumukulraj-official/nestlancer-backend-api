version: 2

updates:
  # ──────────────────────────────────────────────
  # npm dependencies
  # ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Kolkata
    target-branch: main
    open-pull-requests-limit: 10
    reviewers:
      - backend-lead
      - platform-team
    labels:
      - dependencies
      - npm
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
        update-types:
          - minor
          - patch
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
        update-types:
          - minor
          - patch
      testing:
        patterns:
          - 'jest'
          - '@types/jest'
          - 'ts-jest'
          - 'supertest'
        update-types:
          - minor
          - patch
      typescript:
        patterns:
          - 'typescript'
          - '@typescript-eslint/*'
          - 'ts-node'
        update-types:
          - minor
          - patch
      linting:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - 'prettier'
          - '@eslint/*'
        update-types:
          - minor
          - patch
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: 'node'

  # ──────────────────────────────────────────────
  # Docker base images
  # ──────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /docker/gateway
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    reviewers:
      - devops-team

  - package-ecosystem: docker
    directory: /docker/ws-gateway
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    reviewers:
      - devops-team

  - package-ecosystem: docker
    directory: /docker/service-base
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    reviewers:
      - devops-team

  - package-ecosystem: docker
    directory: /docker/worker-base
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    reviewers:
      - devops-team

  # ──────────────────────────────────────────────
  # GitHub Actions
  # ──────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    reviewers:
      - admin
    groups:
      actions:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
