name: CD - Staging

on:
  push:
    branches: [main]

concurrency:
  group: cd-staging
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nestlancer

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component:
          - gateway
          - ws-gateway
          - auth
          - users
          - requests
          - quotes
          - projects
          - progress
          - payments
          - messaging
          - notifications
          - media
          - portfolio
          - blog
          - contact
          - admin
          - webhooks
          - health
          - email-worker
          - notification-worker
          - audit-worker
          - media-worker
          - analytics-worker
          - webhook-worker
          - cdn-worker
          - outbox-poller
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=raw,value=staging-${{ github.sha }}
            type=raw,value=staging-latest

      - name: Determine Dockerfile path
        id: dockerfile
        run: |
          COMPONENT="${{ matrix.component }}"
          if [[ "$COMPONENT" == *"-worker"* ]] || [[ "$COMPONENT" == "outbox-poller" ]]; then
            echo "context=workers/${COMPONENT}" >> "$GITHUB_OUTPUT"
            echo "dockerfile=docker/worker-base/Dockerfile.base" >> "$GITHUB_OUTPUT"
          elif [[ "$COMPONENT" == "gateway" ]] || [[ "$COMPONENT" == "ws-gateway" ]]; then
            echo "context=." >> "$GITHUB_OUTPUT"
            echo "dockerfile=docker/${COMPONENT}/Dockerfile" >> "$GITHUB_OUTPUT"
          else
            echo "context=." >> "$GITHUB_OUTPUT"
            echo "dockerfile=docker/service-base/Dockerfile.base" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=${{ matrix.component }}

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Run migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

      - name: Update image tags in manifests
        run: |
          cd deploy/kubernetes/overlays/staging
          kustomize edit set image \
            nestlancer-gateway=${{ env.IMAGE_PREFIX }}-gateway:staging-${{ github.sha }} \
            nestlancer-ws-gateway=${{ env.IMAGE_PREFIX }}-ws-gateway:staging-${{ github.sha }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k deploy/kubernetes/overlays/staging

      - name: Wait for rollout
        run: |
          kubectl -n nestlancer-staging rollout status deployment/gateway --timeout=300s
          kubectl -n nestlancer-staging rollout status deployment/ws-gateway --timeout=300s

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for service readiness
        run: sleep 30

      - name: Health check
        run: |
          STAGING_URL="${{ secrets.STAGING_API_URL }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/v1/health")
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Health check failed with status ${HTTP_STATUS}"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Readiness check
        run: |
          STAGING_URL="${{ secrets.STAGING_API_URL }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/v1/health/ready")
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Readiness check failed with status ${HTTP_STATUS}"
            exit 1
          fi
          echo "✅ Readiness check passed"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ needs.smoke-test.result == 'success' && '✅' || '❌' }} Staging deployment ${{ needs.smoke-test.result == 'success' && 'succeeded' || 'failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.smoke-test.result == 'success' && '✅' || '❌' }} *Staging Deployment ${{ needs.smoke-test.result == 'success' && 'Succeeded' || 'Failed' }}*\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Branch:* `${{ github.ref_name }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
