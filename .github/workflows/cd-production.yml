name: CD - Production

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g., v1.2.0)'
        required: true
        type: string

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nestlancer

jobs:
  validate:
    name: Validate Staging
    runs-on: ubuntu-latest
    steps:
      - name: Verify staging health
        run: |
          STAGING_URL="${{ secrets.STAGING_API_URL }}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/v1/health")
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Staging is not healthy. Cannot proceed with production deployment."
            exit 1
          fi
          echo "✅ Staging health verified"

  retag-images:
    name: Retag Images for Production
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component:
          - gateway
          - ws-gateway
          - auth
          - users
          - requests
          - quotes
          - projects
          - progress
          - payments
          - messaging
          - notifications
          - media
          - portfolio
          - blog
          - contact
          - admin
          - webhooks
          - health
          - email-worker
          - notification-worker
          - audit-worker
          - media-worker
          - analytics-worker
          - webhook-worker
          - cdn-worker
          - outbox-poller
    steps:
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Retag staging image to production
        run: |
          SOURCE="${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:staging-latest"
          VERSION_TAG="${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:${{ steps.version.outputs.tag }}"
          LATEST_TAG="${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:latest"

          docker pull "${SOURCE}"
          docker tag "${SOURCE}" "${VERSION_TAG}"
          docker tag "${SOURCE}" "${LATEST_TAG}"
          docker push "${VERSION_TAG}"
          docker push "${LATEST_TAG}"

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: retag-images
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '9'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Run migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [retag-images, migrate]
    environment:
      name: production
      url: https://api.nestlancer.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PRODUCTION_KUBECONFIG }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k deploy/kubernetes/overlays/production

      - name: Monitor rolling update
        run: |
          SERVICES="gateway ws-gateway auth users requests quotes projects progress payments messaging notifications media portfolio blog contact admin webhooks health"
          for svc in $SERVICES; do
            echo "⏳ Waiting for ${svc} rollout..."
            kubectl -n nestlancer rollout status deployment/${svc} --timeout=300s || {
              echo "❌ ${svc} rollout failed, initiating rollback"
              kubectl -n nestlancer rollout undo deployment/${svc}
              exit 1
            }
          done
          echo "✅ All services deployed successfully"

  smoke-test:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for service readiness
        run: sleep 30

      - name: Health check
        run: |
          PROD_URL="https://api.nestlancer.com"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/api/v1/health")
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Production health check failed with status ${HTTP_STATUS}"
            exit 1
          fi
          echo "✅ Production health check passed"

      - name: Auth endpoint check
        run: |
          PROD_URL="https://api.nestlancer.com"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/api/v1/auth/status")
          if [ "$HTTP_STATUS" -eq 500 ]; then
            echo "❌ Auth service returned 500"
            exit 1
          fi
          echo "✅ Auth endpoint responding"

      - name: API version check
        run: |
          PROD_URL="https://api.nestlancer.com"
          RESPONSE=$(curl -s "${PROD_URL}/api/v1/health")
          echo "Health response: ${RESPONSE}"

  create-deployment-record:
    name: Create Deployment Record
    runs-on: ubuntu-latest
    needs: smoke-test
    if: success()
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Record deployment
        run: |
          echo "🚀 Production deployment completed"
          echo "Version: ${{ steps.version.outputs.tag }}"
          echo "SHA: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ needs.smoke-test.result == 'success' && '🚀' || '❌' }} Production deployment ${{ needs.smoke-test.result == 'success' && 'succeeded' || 'failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.smoke-test.result == 'success' && '🚀' || '❌' }} *Production Deployment ${{ needs.smoke-test.result == 'success' && 'Succeeded' || 'Failed' }}*\n*Version:* `${{ github.event.release.tag_name || github.event.inputs.version }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
