global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: nestlancer
    environment: "${ENVIRONMENT:-development}"

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── Prometheus self-monitoring ──
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── API Gateway ──
  - job_name: gateway
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['gateway:3000']
        labels:
          service: gateway
          tier: entry

  # ── WebSocket Gateway ──
  - job_name: ws-gateway
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['ws-gateway:3001']
        labels:
          service: ws-gateway
          tier: entry

  # ── Feature Services ──
  - job_name: services
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['health:3010']
        labels: { service: health }
      - targets: ['auth:3011']
        labels: { service: auth }
      - targets: ['users:3012']
        labels: { service: users }
      - targets: ['requests:3013']
        labels: { service: requests }
      - targets: ['quotes:3014']
        labels: { service: quotes }
      - targets: ['projects:3015']
        labels: { service: projects }
      - targets: ['progress:3016']
        labels: { service: progress }
      - targets: ['payments:3017']
        labels: { service: payments }
      - targets: ['messaging:3018']
        labels: { service: messaging }
      - targets: ['notifications:3019']
        labels: { service: notifications }
      - targets: ['media:3020']
        labels: { service: media }
      - targets: ['portfolio:3021']
        labels: { service: portfolio }
      - targets: ['blog:3022']
        labels: { service: blog }
      - targets: ['contact:3023']
        labels: { service: contact }
      - targets: ['admin:3024']
        labels: { service: admin }
      - targets: ['webhooks:3025']
        labels: { service: webhooks }

  # ── Node Exporter (host metrics) ──
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # ── PostgreSQL ──
  - job_name: postgresql
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgresql

  # ── Redis ──
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis

  # ── RabbitMQ ──
  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: rabbitmq
