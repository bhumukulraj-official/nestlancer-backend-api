# Nestlancer - Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_DB: nestlancer_prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'
    ports: []
    expose:
      - '5432'

  redis-cache:
    restart: unless-stopped
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    ports: []
    expose:
      - '6379'

  redis-pubsub:
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD:-changeme}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    ports: []
    expose:
      - '6379'

  rabbitmq:
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nestlancer}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-changeme}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    ports: []
    expose:
      - '5672'
      - '15672'

  # MailHog disabled in production
  mailhog:
    profiles:
      - disabled
