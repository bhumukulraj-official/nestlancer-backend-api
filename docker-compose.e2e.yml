# Nestlancer – E2E Test Infrastructure
# Spins up all external dependencies for end-to-end testing.

services:
  postgres:
    image: postgres:15-alpine
    container_name: nestlancer-e2e-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestlancer_e2e
    ports:
      - "5433:5432"
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis-cache:
    image: redis:7-alpine
    container_name: nestlancer-e2e-redis-cache
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis-pubsub:
    image: redis:7-alpine
    container_name: nestlancer-e2e-redis-pubsub
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nestlancer-e2e-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: nestlancer-e2e-minio
    ports:
      - "9002:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    tmpfs: /data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: nestlancer-e2e-mailhog
    ports:
      - "1026:1025"
      - "8026:8025"
