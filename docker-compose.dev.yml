# Nestlancer - Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  postgres:
    environment:
      POSTGRES_DB: nestlancer_dev
    ports:
      - '5432:5432'

  redis-cache:
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --loglevel verbose

  redis-pubsub:
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction --loglevel verbose

  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # ───────────────────────────────────────────────
  # MinIO – S3-compatible Object Storage (optional)
  # ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nestlancer-minio
    ports:
      - '9000:9000'  # API
      - '9001:9001'  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - nestlancer-network
    profiles:
      - full

  # ───────────────────────────────────────────────
  # Jaeger – Distributed Tracing (optional)
  # ───────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: nestlancer-jaeger
    ports:
      - '16686:16686' # UI
      - '14268:14268' # Collector HTTP
      - '14250:14250' # Collector gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
      SPAN_STORAGE_TYPE: memory
    networks:
      - nestlancer-network
    profiles:
      - full

volumes:
  minio-data:
    driver: local
