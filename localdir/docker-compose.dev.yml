services:
  gateway:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    container_name: nestlancer-gateway
    ports:
      - '127.0.0.1:3000:3000'
      - '${TAILSCALE_IP:-100.89.176.3}:3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm turbo dev --filter=@nestlancer/gateway
    env_file: .env.development
    networks:
      - nestlancer-network
    depends_on:
      - mailpit
      - minio
      - jaeger

  ws-gateway:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    container_name: nestlancer-ws-gateway
