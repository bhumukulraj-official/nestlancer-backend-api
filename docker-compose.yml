# Nestlancer - Main Docker Compose
# Infrastructure services 
# PostgreSQL, Redis, and RabbitMQ are hosted externally on VPS

services:
  # ───────────────────────────────────────────────
  # MailHog – Local Email Testing
  # ───────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nestlancer-mailhog
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    networks:
      - nestlancer-network

  # ───────────────────────────────────────────────
  # MinIO – S3-compatible Object Storage
  # ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nestlancer-minio
    ports:
      - '9000:9000'  # API
      - '9001:9001'  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - nestlancer-network

  # ───────────────────────────────────────────────
  # Jaeger – Distributed Tracing
  # ───────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: nestlancer-jaeger
    ports:
      - '16686:16686' # UI
      - '14268:14268' # Collector HTTP
      - '14250:14250' # Collector gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
      SPAN_STORAGE_TYPE: memory
    networks:
      - nestlancer-network

volumes:
  minio-data:
    driver: local

networks:
  nestlancer-network:
    driver: bridge
    name: nestlancer-network
