# Nestlancer - Main Docker Compose
# Infrastructure services shared across all environments
# Use with environment-specific overrides:
#   dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   test: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#   prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ───────────────────────────────────────────────
  # PostgreSQL 16 – Primary Database
  # ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nestlancer-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestlancer_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nestlancer-network

  # ───────────────────────────────────────────────
  # Redis 7 – Cache Instance (port 6379)
  # ───────────────────────────────────────────────
  redis-cache:
    image: redis:7-alpine
    container_name: nestlancer-redis-cache
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-cache-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nestlancer-network

  # ───────────────────────────────────────────────
  # Redis 7 – Pub/Sub Instance (port 6380)
  # ───────────────────────────────────────────────
  redis-pubsub:
    image: redis:7-alpine
    container_name: nestlancer-redis-pubsub
    ports:
      - '6380:6379'
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - redis-pubsub-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nestlancer-network

  # ───────────────────────────────────────────────
  # RabbitMQ 3.13 – Message Broker
  # ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nestlancer-rabbitmq
    ports:
      - '5672:5672'   # AMQP
      - '15672:15672' # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nestlancer-network

  # ───────────────────────────────────────────────
  # MailHog – Local Email Testing
  # ───────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: nestlancer-mailhog
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    networks:
      - nestlancer-network

volumes:
  pgdata:
    driver: local
  redis-cache-data:
    driver: local
  redis-pubsub-data:
    driver: local
  rabbitmq-data:
    driver: local

networks:
  nestlancer-network:
    driver: bridge
    name: nestlancer-network
