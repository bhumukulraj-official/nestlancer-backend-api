apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-worker
  namespace: nestlancer
  labels:
    app.kubernetes.io/name: webhook-worker
    app.kubernetes.io/component: webhook-worker
    app.kubernetes.io/part-of: nestlancer
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webhook-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhook-worker
        app.kubernetes.io/component: webhook-worker
        app.kubernetes.io/part-of: nestlancer
        tier: worker
    spec:
      serviceAccountName: nestlancer-sa
      containers:
        - name: webhook-worker
          image: ghcr.io/nestlancer/nestlancer-webhook-worker:latest
          envFrom:
            - configMapRef:
                name: nestlancer-config
            - secretRef:
                name: nestlancer-secrets
          env:
            - name: SERVICE_NAME
              value: "webhook-worker"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      restartPolicy: Always
