apiVersion: v1
kind: Secret
metadata:
  name: nestlancer-secrets
  namespace: nestlancer
  labels:
    app.kubernetes.io/part-of: nestlancer
type: Opaque
data: {}
# Secrets are populated via:
#   - Sealed Secrets controller
#   - External Secrets Operator (from AWS Secrets Manager)
#   - kustomize secretGenerator with envs
#
# Required keys:
#   DATABASE_URL
#   JWT_ACCESS_SECRET
#   JWT_REFRESH_SECRET
#   RAZORPAY_KEY_ID
#   RAZORPAY_KEY_SECRET
#   RAZORPAY_WEBHOOK_SECRET
#   SMTP_USER
#   SMTP_PASS
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
