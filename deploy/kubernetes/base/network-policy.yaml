apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: nestlancer
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: nestlancer
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gateway
  ingress:
    - from: []
      ports:
        - port: 3000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ws-gateway-ingress
  namespace: nestlancer
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ws-gateway
  ingress:
    - from: []
      ports:
        - port: 3001
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-services
  namespace: nestlancer
spec:
  podSelector:
    matchLabels:
      tier: service
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
      ports:
        - protocol: TCP
