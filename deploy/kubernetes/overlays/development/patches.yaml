# Scale down for development
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-gateway
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
spec:
  replicas: 1
---
# Use smaller resource limits
apiVersion: v1
kind: ConfigMap
metadata:
  name: nestlancer-config
data:
  NODE_ENV: "development"
  LOG_LEVEL: "debug"
  RATE_LIMIT_ENABLED: "false"
