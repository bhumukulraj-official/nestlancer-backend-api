apiVersion: apps/v1
kind: Deployment
metadata:
  name: requests
  namespace: nestlancer
  labels:
    app.kubernetes.io/name: requests
    app.kubernetes.io/component: requests
    app.kubernetes.io/part-of: nestlancer
    tier: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: requests
  template:
    metadata:
      labels:
        app.kubernetes.io/name: requests
        app.kubernetes.io/component: requests
        app.kubernetes.io/part-of: nestlancer
        tier: service
    spec:
      serviceAccountName: nestlancer-sa
      containers:
        - name: requests
          image: ghcr.io/nestlancer/nestlancer-requests:latest
          ports:
            - containerPort: 3013
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nestlancer-config
            - secretRef:
                name: nestlancer-secrets
          env:
            - name: PORT
              value: "3013"
            - name: SERVICE_NAME
              value: "requests"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3013
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3013
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3013
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: requests
