apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: media-hpa
  namespace: nestlancer
  labels:
    app.kubernetes.io/name: media
    app.kubernetes.io/part-of: nestlancer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: media
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
