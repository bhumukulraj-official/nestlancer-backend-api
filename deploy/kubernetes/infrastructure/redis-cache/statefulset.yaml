apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cache
  namespace: nestlancer
spec:
  serviceName: redis-cache
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-cache
        app.kubernetes.io/part-of: nestlancer
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server"]
          args:
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--appendonly"
            - "no"
            - "--save"
            - ""
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
