apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
  namespace: nestlancer
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  pg_dump -h postgresql -U postgres -d nestlancer | gzip > /backups/nestlancer-$(date +%Y%m%d-%H%M%S).sql.gz
                  # Upload to S3 and cleanup old backups
                  find /backups -name "*.sql.gz" -mtime +7 -delete
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: password
              volumeMounts:
                - name: backup-volume
                  mountPath: /backups
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: postgresql-backups
          restartPolicy: OnFailure
