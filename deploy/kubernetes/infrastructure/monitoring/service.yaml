apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: nestlancer
spec:
  ports:
    - port: 9090
  selector:
    app.kubernetes.io/name: prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: nestlancer
spec:
  ports:
    - port: 3200
  selector:
    app.kubernetes.io/name: grafana
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: nestlancer
spec:
  ports:
    - port: 16686
      name: query
    - port: 14268
      name: collector
  selector:
    app.kubernetes.io/name: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: nestlancer
spec:
  ports:
    - port: 9093
  selector:
    app.kubernetes.io/name: alertmanager
